<div class="cita-card" [class]="getTipoClass()">
    <div class="cita-header">
        <div class="d-flex justify-content-between align-items-start">
            <div>
                <h5 class="cita-mascota">{{ cita.nombreMascota }}</h5>
                <p class="cita-servicio text-muted">{{ cita.servicioRequerido }}</p>
            </div>
            <span class="badge" [class]="getEstadoClass(cita.estado)">
                {{ getEstadoLabel(cita.estado) }}
            </span>
        </div>
    </div>

    <div class="cita-details">
        <div class="detail-row">
            <i class="bi bi-calendar3 me-2"></i>
            <span>{{ cita.fechaPreferida | date:'dd/MM/yyyy' }}</span>
        </div>
        <div class="detail-row">
            <i class="bi bi-clock me-2"></i>
            <span>{{ cita.horaPreferida }}</span>
        </div>
        <div class="detail-row">
            <i class="bi bi-person-badge me-2"></i>
            <span>{{ cita.veterinario }}</span>
        </div>
        <div class="detail-row" *ngIf="cita.observaciones">
            <i class="bi bi-chat-left-text me-2"></i>
            <span class="text-truncate">{{ cita.observaciones }}</span>
        </div>
    </div>

    <div class="cita-actions mt-3">
        <button class="btn btn-outline-primary btn-sm me-2" (click)="onVerDetalles()">
            <i class="bi bi-eye me-1"></i>
            Ver Detalles
        </button>
        <button class="btn btn-outline-secondary btn-sm"
            *ngIf="cita.estado === 'pendiente' || cita.estado === 'confirmada'" (click)="onCancelar()">
            <i class="bi bi-x-circle me-1"></i>
            Cancelar
        </button>
    </div>
</div>

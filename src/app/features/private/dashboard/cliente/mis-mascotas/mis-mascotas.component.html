<div class="mis-mascotas">
    <div class="row">
        <div class="col-12">
            <div class="page-header mb-4">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <h1 class="h2 fw-bold">Mis Mascotas</h1>
                        <p class="text-muted">Gestiona la información de tus mascotas</p>
                    </div>
                    <button class="btn btn-primary">
                        <i class="bi bi-plus-circle me-2"></i>
                        Agregar Mascota
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="row" *ngIf="mascotas.length > 0; else noMascotas">
        <div class="col-12 col-md-6 col-lg-6 col-xl-4 mb-4" *ngFor="let mascota of mascotas">
            <app-mi-mascota-card [mascota]="transformMascota(mascota)" (agendarCita)="agendarCita($event)"
                (editar)="editarMascota($event)">
            </app-mi-mascota-card>
        </div>
    </div>

    <!-- Empty State -->
    <ng-template #noMascotas>
        <div class="row">
            <div class="col-12">
                <div class="empty-state text-center py-5">
                    <i class="bi bi-heart display-1 text-muted mb-3"></i>
                    <h3 class="fw-bold mb-3">No tienes mascotas registradas</h3>
                    <p class="text-muted mb-4">Agrega información de tus mascotas para un mejor seguimiento de su salud
                    </p>
                    <button class="btn btn-primary">
                        <i class="bi bi-plus-circle me-2"></i>
                        Agregar Mi Primera Mascota
                    </button>
                </div>
            </div>
        </div>
    </ng-template>
</div>
